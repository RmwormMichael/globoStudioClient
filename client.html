<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Globo Studio</title>
    <link rel="stylesheet" href="./view/css/styles.css">

    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" 
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
</head>
<body>
    <div class="background-container"></div>

    <!-- Barra superior -->
    <header class="top-bar">
        <nav>
            <h1 id="logo">
                <img src="./view/img/Logo.png" alt="">
                Globo Studio
            </h1>
        </nav>
 
        <div class="profile-icon" onclick="mostrarSidebar()">
            <i class="bi bi-person-circle"></i> <!-- Ícono de perfil de Bootstrap -->
        </div>
    </header>

    <!-- Barra lateral (Sidebar) -->
    <aside class="sidebar" id="sidebar">
        <button class="close-btn" onclick="cerrarSidebar()">X</button>
        <ul>
            <li onclick="mostrarProfile()"><i class="bi bi-person"></i> Perfil</li>
            <li onclick="mostrarCotizaciones()"><i class="bi bi-file-earmark-text"></i> Mis Cotizaciones</li>
            <li onclick="mostrarSettings()"><i class="bi bi-gear"></i> Ajustes</li>
            <li onclick="cerrarSesion()"><i class="bi bi-box-arrow-right"></i> Cerrar Sesion</li>
        </ul>
    </aside>
    
    <!-- Overlay -->
    <div id="overlay" class="overlay"></div>

    <!-- Contenido dinámico -->
    <main id="contenidoTemptlate">
        <img class="imglogo" src="./view/img/globoStudioLogo.png" alt="">
        <!-- Aquí se carga el contenido dinámico -->
    <!--Aqui se muestra your profile -->
    </main>
    <template id="yourProfileTemplate">
        <div class="profile-container">
            <div class="profile-card">
                <div class="profile-avatar" id="profileAvatar">O</div>
                <h2 id="profileWelcome">Oscar julian pulido vargas</h2>
                <ul class="profile-info">
                    <li><strong>Email:</strong> <span id="profileEmail">pulidovargasoscar@gmail.com</span></li>
                    <li><strong>Estado de la cuenta:</strong> <span id="profileStatus">Activo</span></li>
                    <li><strong>Fecha de registro:</strong> <span id="profileRegisterDate">12/01/2023</span></li>
                    <li><strong>Último acceso:</strong> <span id="profileLastLogin">23/02/2025</span></li>
                </ul>
            </div>
        </div>
    </template>

    <!-- Aqui se encuentra Mis cotizaciones-->
    <template id="cotizaciones">
        <div class="cotizaciones-container">
            <div class="cotizaciones-card">
                <h2 class="cotizaciones-title">Mis Cotizaciones</h2>
                
                <!-- Buscador -->
                <div class="search-container">
                    <input type="text" class="search-input" placeholder="Buscar cotización...">
                    <button class="search-btn">Buscar Cotización</button>
                </div>
                
                <!-- Filtros -->
                <div class="filter-container">
                    <button class="filter-btn active">Activos</button>
                    <button class="filter-btn">Aceptados</button>
                    <button class="filter-btn">Rechazados</button>
                </div>
                
                <!-- Tabla -->
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Fecha</th>
                                <th>Nombre</th>
                                <th>Email de Confirmación</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>2025-02-20</td>
                                <td>P-1</td>
                                <td>cliente1@example.com</td>
                                <td>
                                    <button class="verDetalles-btn">Ver Detalles</button>
                                </td>
                            </tr>
                            <tr>
                                <td>2025-02-21</td>
                                <td>P-2</td>
                                <td>cliente2@example.com</td>
                                <td>
                                    <button class="verDetalles-btn">Ver Detalles</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
    
                <!-- Botón Aceptar Todo -->
                <button class="AceptarTodo-all-btn">Aceptar Todo</button>
            </div>
        </div>
    </template>
    <!---------------------------Ajsutes---------------------------->
    <template id="ajustes">
        <div class="settings-container">
            <div class="settings-card">
                <h2 class="settings-title">Ajustes</h2>
    
                <div class="settings-group">
                    <label>Email:</label>
                    <span id="user-email">pulidovargasoscar@gmail.com</span>
                </div>

                <div class="settings-group">
                    <label>Contraseña:</label>
                    <span>********</span>
                </div>
    
                <div class="settings-group">
                    <label for="edit-email">Cambiar Email:</label>
                    <input type="email" id="edit-email" class="settings-input" placeholder="Nuevo email">
                </div>
    
    
                <div class="settings-group">
                    <label for="change-password">Cambiar Contraseña:</label>
                    <input type="password" id="change-password" class="settings-input" placeholder="Nueva contraseña">
                </div>
    
                <button class="save-btn">Guardar</button>
            </div>
        </div>
        
    </template>


<footer><!------------------ footer -------------->
    <h5 class="contact">Contáctanos</h5>
    <div class="footer">
        <div class="footerUno">
            <p class="dateFooter">Celular: (+57) 314 211 99 46</p>
            <p class="dateFooter">Bogotá, Colombia</p>
            <p class="dateFooter">Envios unicamente en Bogotá.</p>
            <p class="dateFooter">Síguenos en nuestras redes:</p>
        </div>
        <div class="footerDos">
            <a href="https://www.facebook.com/share/1DfwVBr9ZL/" target="_blank">
                <img class="imgContact" src="/view/img/facebook.svg" alt="Facebook">
            </a>
            <a href="https://wa.me/3142119946" target="_blank">
                <img class="imgContact" src="/view/img/whatsapp.svg" alt="WhatsApp">
            </a>
            <a href="https://www.instagram.com/globo_arte_marthaperez?igsh=d3YycG52cDFyNWNw" target="_blank">
                <img class="imgContact" src="/view/img/instagram.svg" alt="Instagram">
            </a>
        </div>
    </div>
</footer>


    
    <script src="/controller/controllerClient.js"></script>
    

</body>
</html>
